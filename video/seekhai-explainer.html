<title>Seekhai — 2-minute product tour</title>

<style>
  :root{
    --stage:#0d1411; --stage2:#131d19; --edge:#20302a;
    --paper:#fbfbfa; --paper2:#f1f0ec; --line:#dcdbd6;
    --ink:#14201b; --ink-soft:#4a5a52;
    --accent:#37b98a; --accent-2:#5fd3a8; --accent-deep:#2f5d50;
    --muted:#8ea79c; --muted-dim:#5f7369;
    --ok:#1f7a4d; --bad:#b23a2d; --warn:#b8862a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 50% -10%, #16241d 0%, transparent 60%),
      var(--stage);
    color:#dfeee7; font-family:var(--sans);
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:24px; overflow:hidden;
  }

  /* ---- the video frame ---------------------------------------------------- */
  .stage{
    position:relative; width:min(96vw,1120px); aspect-ratio:16/9;
    background:var(--stage2); border:1px solid var(--edge); border-radius:16px;
    box-shadow:0 40px 120px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.03);
    overflow:hidden;
  }
  .chrome{position:absolute; inset:0; z-index:6; pointer-events:none}
  .wordmark{position:absolute; top:18px; left:22px; font-weight:800; letter-spacing:.02em; font-size:15px}
  .wordmark .dot{color:var(--accent)}
  .counter{position:absolute; top:18px; right:22px; font-family:var(--mono); font-size:12px; color:var(--muted-dim); font-variant-numeric:tabular-nums}
  .scene-label{position:absolute; top:44px; left:22px; font-family:var(--mono); font-size:12px; color:var(--accent); letter-spacing:.04em; opacity:.9}

  /* scene deck */
  .screen{position:absolute; inset:0}
  .scene{position:absolute; inset:0; display:grid; place-items:center; opacity:0; transform:scale(1.015);
    transition:opacity .6s ease, transform .6s ease; padding:64px 60px 150px}
  .scene.active{opacity:1; transform:none}
  .mock{width:100%; max-width:760px}

  /* light app surface used inside scenes */
  .app{background:var(--paper); color:var(--ink); border-radius:12px; border:1px solid var(--line);
    box-shadow:0 20px 50px rgba(0,0,0,.35); overflow:hidden}
  .app .bar{display:flex; align-items:center; gap:8px; padding:10px 14px; background:var(--paper2); border-bottom:1px solid var(--line)}
  .app .bar i{width:10px; height:10px; border-radius:50%; background:#cfceca; display:block}
  .app .bar span{font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin-left:8px}
  .app .body{padding:22px 24px}

  h2.big{font-size:30px; font-weight:800; letter-spacing:-.01em; margin:0 0 6px; text-wrap:balance}
  .lead{color:var(--ink-soft); font-size:15px; margin:0}
  .field{margin-top:16px; border:2px solid var(--line); border-radius:10px; padding:14px 16px; font-size:17px; background:#fff; color:var(--ink); display:flex; align-items:center}
  .field .ph{color:#a9b0aa}
  .caret{display:inline-block; width:2px; height:1.15em; background:var(--accent-deep); margin-left:1px; vertical-align:-2px; animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .btn{margin-top:16px; display:inline-block; background:var(--accent-deep); color:#fff; font-weight:700; font-size:15px; padding:13px 20px; border-radius:10px}
  .btn.pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(47,93,80,.45)}50%{box-shadow:0 0 0 10px rgba(47,93,80,0)}}

  /* build log terminal */
  .term{font-family:var(--mono); font-size:12.5px; line-height:1.9; background:#0b1a14; color:#cfe6da;
    border:1px solid #1c3329; border-radius:12px; padding:16px 18px; height:300px; overflow:hidden}
  .term .ln{opacity:0; transform:translateY(6px)}
  .term.run .ln{animation:logIn .4s ease forwards}
  @keyframes logIn{to{opacity:1; transform:none}}
  .ph2{color:#5c8a78; display:inline-block; min-width:96px}
  .k-web{color:#7fd1c4}.k-audit{color:#d3a4ff}.k-gen{color:#ffd580}.k-chk{color:#a8e06a}.k-done{color:#7CFFB2;font-weight:700}
  .pbar{height:8px; background:#0b1a14; border:1px solid #1c3329; border-radius:99px; margin-top:14px; overflow:hidden}
  .pbar>span{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent-deep),var(--accent))}
  .term.run + .pbar>span{animation:fill 15s linear forwards}
  @keyframes fill{to{width:100%}}

  /* curriculum */
  .topic{display:flex; align-items:center; gap:12px; padding:14px 16px; border:1px solid var(--line); border-radius:10px; margin-top:10px; background:#fff; opacity:0; transform:translateX(-8px)}
  .scene.active .topic{animation:slideIn .5s ease forwards}
  .topic:nth-child(2){animation-delay:.15s}.topic:nth-child(3){animation-delay:.3s}
  @keyframes slideIn{to{opacity:1; transform:none}}
  .dl{font-family:var(--mono); font-size:12px; font-weight:700; padding:3px 9px; border-radius:99px}
  .dl1{color:var(--ok); background:#eaf5ef; border:1px solid #bfe0cd}
  .dl2{color:var(--warn); background:#fbf4e3; border:1px solid #e6d4a0}
  .dl3{color:var(--bad); background:#fbeeeb; border:1px solid #e6bdb4}
  .chips{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap}
  .chip-stat{font-family:var(--mono); font-size:12px; background:var(--paper2); border:1px solid var(--line); padding:8px 12px; border-radius:8px; color:var(--ink-soft)}
  .chip-stat b{color:var(--ink)}

  /* illustration (architecture diagram, drawn) */
  .diagram{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:8px}
  .node{border:2px solid var(--accent-deep); border-radius:12px; padding:16px 12px; text-align:center; font-weight:700; font-size:13px; color:var(--ink); background:#f2f8f5; position:relative}
  .node small{display:block; font-weight:500; color:var(--ink-soft); font-size:11px; margin-top:3px}
  .orch{grid-column:1 / -1; border-style:dashed; border-color:var(--accent)}
  .illus-frame{transform:scale(.9); opacity:0}
  .scene.active .illus-frame{animation:zoomIn .8s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes zoomIn{to{transform:none; opacity:1}}
  .zoom-tag{position:absolute; right:14px; top:12px; font-family:var(--mono); font-size:11px; color:var(--accent-deep); background:#eaf5ef; border:1px solid #bfe0cd; padding:4px 8px; border-radius:99px}

  /* learn rail (non-linear) */
  .learn{display:grid; grid-template-columns:210px 1fr; gap:16px}
  .rail{background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px}
  .rail .sub{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin:8px 4px 4px}
  .qitem{display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:7px; font-size:12.5px; color:var(--ink)}
  .qitem .t{width:16px; text-align:center; font-weight:800}
  .qitem.here{background:#e3ede9; font-weight:700}
  .t.ok{color:var(--ok)} .t.bad{color:var(--bad)} .t.none{color:#b9c0ba}
  .qitem .tag{margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink-soft)}
  .qbody{background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px}
  .qbody .qh{display:flex; gap:8px; align-items:center; margin-bottom:10px}
  .badge{font-size:11px; padding:2px 9px; border-radius:99px; border:1px solid var(--line); color:var(--ink-soft)}

  /* drag-drop */
  .dd-boxes{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:6px}
  .box{border:2px dashed var(--line); border-radius:12px; padding:12px; min-height:78px; display:flex; flex-direction:column; gap:6px; background:#fff; transition:border-color .3s, background .3s}
  .box .lab{font-weight:700; font-size:13px}
  .box.filled{border-style:solid; border-color:var(--ok); background:#f1f8f4}
  .ent{position:absolute; left:0; right:0; margin:0 auto; width:max-content; max-width:70%; background:#fff; border:2px solid var(--accent-deep); color:var(--ink);
    padding:9px 13px; border-radius:10px; font-size:12.5px; font-weight:600; box-shadow:0 8px 20px rgba(0,0,0,.15); z-index:3}
  .placed-chip{display:inline-block; background:#eaf5ef; border:1px solid #bfe0cd; color:var(--accent-deep); font-weight:600; font-size:12px; padding:5px 9px; border-radius:8px; opacity:0}
  .box.filled .placed-chip{animation:pop .3s ease forwards}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:none;opacity:1}}

  /* dashboard */
  .dash{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:14px 16px}
  .card h4{margin:0 0 10px; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft)}
  .accrow{display:flex; align-items:center; gap:10px; margin:8px 0; font-size:12.5px}
  .meter{flex:1; height:9px; background:var(--paper2); border-radius:99px; overflow:hidden}
  .meter>span{display:block; height:100%; width:0; background:var(--accent-deep)}
  .scene.active .meter>span{animation:grow 1.1s ease forwards}
  @keyframes grow{to{width:var(--w)}}
  .weak{display:flex; justify-content:space-between; font-size:12.5px; padding:6px 0; border-bottom:1px dashed var(--line)}
  .weak b{color:var(--bad)}
  .fb{display:flex; gap:8px; margin-top:10px}
  .thumb{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;font-size:16px;background:#fff}
  .thumb.up{border-color:#bfe0cd;background:#f1f8f4}

  /* pdf upload */
  .drop{border:2px dashed var(--accent-deep); border-radius:14px; padding:30px; text-align:center; background:#f2f8f5; position:relative; overflow:hidden}
  .drop .file{display:inline-flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600;
    transform:translateY(-40px); opacity:0}
  .scene.active .drop .file{animation:drop .7s cubic-bezier(.2,.8,.2,1) .2s forwards}
  @keyframes drop{to{transform:none; opacity:1}}
  .shimmer{margin-top:14px; height:8px; border-radius:99px; background:linear-gradient(90deg,#cfe4d9,#eef6f1,#cfe4d9); background-size:200% 100%; animation:shim 1.4s linear infinite}
  @keyframes shim{to{background-position:-200% 0}}
  .parse{margin-top:12px; font-family:var(--mono); font-size:12px; color:var(--accent-deep)}

  /* outro */
  .outro{text-align:center}
  .outro .logo{font-size:60px; font-weight:800; letter-spacing:-.02em}
  .outro .logo .dot{color:var(--accent)}
  .outro .tag{color:var(--muted); margin-top:8px; font-size:17px}

  /* ---- caption band (feature text) --------------------------------------- */
  .caption{position:absolute; left:0; right:0; bottom:0; z-index:7; padding:22px 30px 24px;
    background:linear-gradient(180deg, transparent, rgba(6,12,10,.86) 40%);}
  .cap-eyebrow{font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent)}
  .cap-title{font-size:23px; font-weight:800; letter-spacing:-.01em; margin-top:3px; color:#eafff6; text-wrap:balance; max-width:78%}
  .cap-in{display:inline-block; animation:capIn .5s ease}
  @keyframes capIn{from{opacity:0; transform:translateY(8px)}to{opacity:1; transform:none}}

  /* timeline */
  .timeline{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.08); z-index:8}
  .timeline>span{display:block; height:100%; width:0; background:var(--accent)}

  /* controls */
  .controls{position:absolute; bottom:14px; right:18px; z-index:9; display:flex; gap:8px; align-items:center}
  .ctl{width:34px;height:34px;border-radius:9px;border:1px solid var(--edge);background:rgba(255,255,255,.06); color:#cfe6da; cursor:pointer; font-size:14px; display:grid; place-items:center}
  .ctl:hover{background:rgba(255,255,255,.12)}
  .cover{position:absolute; inset:0; z-index:20; background:radial-gradient(700px 400px at 50% 40%, #16241d, #0b120f); display:grid; place-items:center; cursor:pointer}
  .cover .play{width:88px;height:88px;border-radius:50%; background:var(--accent); color:#06120d; display:grid; place-items:center; font-size:32px; box-shadow:0 20px 60px rgba(55,185,138,.4); transition:transform .2s}
  .cover:hover .play{transform:scale(1.06)}
  .cover .t1{position:absolute; bottom:130px; font-weight:800; font-size:26px; letter-spacing:-.01em}
  .cover .t2{position:absolute; bottom:100px; color:var(--muted); font-size:14px; font-family:var(--mono)}
  .hide{opacity:0!important; pointer-events:none}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001s!important; transition-duration:.2s!important}
  }
  @media (max-width:640px){ .cap-title{font-size:18px; max-width:100%} h2.big{font-size:22px} .learn{grid-template-columns:1fr} }
</style>

<div class="stage" id="stage">
  <div class="chrome">
    <div class="wordmark">seekhai<span class="dot">.</span></div>
    <div class="counter" id="counter">01 / 10</div>
    <div class="scene-label" id="slabel">// 01 · sign in</div>
  </div>

  <div class="screen" id="screen"></div>

  <div class="caption">
    <div class="cap-eyebrow" id="capEye">Get started</div>
    <div class="cap-title" id="capTitle">Just your name to begin.</div>
  </div>

  <div class="timeline"><span id="tl"></span></div>
  <div class="controls">
    <button class="ctl" id="muteBtn" title="Mute">♪</button>
    <button class="ctl" id="restartBtn" title="Restart">⟲</button>
  </div>

  <div class="cover" id="cover">
    <div class="play">▶</div>
    <div class="t1">Seekhai — a 2-minute tour</div>
    <div class="t2">Multi-Agent Orchestration · built for “Mohit”</div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---- scene content (uses Arun's real course) --------------------------
  var C = {
    prompt: "I want a mini but intermediate course on multi agent orchestration",
    title: "Multi-Agent Orchestration: Architectures, Coordination & Production Systems"
  };

  var scenes = [
    { label:"sign in", eye:"Get started", cap:"Sign in with just a name — Mohit. Your history personalizes every future course.",
      html: signup },
    { label:"one prompt", eye:"Ask in plain language", cap:"One prompt. Seekhai’s agents research the live web and design a whole course.",
      html: promptScene },
    { label:"build log", eye:"Watch it build, live", cap:"A multi-agent pipeline — web scouting → generation → independent verification — streamed as a live build log.",
      html: buildLog, run:true },
    { label:"curriculum", eye:"A calibrated curriculum", cap:"Topics graded DL1–DL3 for adaptive difficulty, with build cost & time-to-finish shown up front.",
      html: curriculum },
    { label:"illustrations", eye:"Auto-sourced illustrations", cap:"Diagrams sourced or generated per concept — click any illustration to enlarge.",
      html: illustration },
    { label:"non-linear", eye:"Learn non-linearly", cap:"Jump between questions in any order. Green = right, red = wrong — and the difficulty adapts as you go.",
      html: learnRail },
    { label:"interactions", eye:"Not just multiple-choice", cap:"Drag-drop diagrams, step-ordering, fill-in-the-blanks and guided code walkthroughs.",
      html: dragdrop },
    { label:"dashboard", eye:"Know where you stand", cap:"A dashboard of strengths & weaknesses, adaptive DL tracking, and one-tap feedback on every item.",
      html: dashboard },
    { label:"from your files", eye:"Or start from your own material", cap:"New: upload a PDF or slide deck — Seekhai builds the course straight from it.",
      html: pdfUpload },
    { label:"seekhai", eye:"Learn anything, by doing", cap:"Seekhai — an agent-built, adaptive way to learn.",
      html: outro }
  ];
  // durations (seconds) → ~118s total
  var DUR = [9,12,17,14,12,15,17,14,8,4];

  // ---- scene renderers ---------------------------------------------------
  function signup(){
    return app("seekhai · sign in",
      '<h2 class="big">Welcome to Seekhai</h2><p class="lead">What should we call you? Your name lets us learn how you learn.</p>'+
      '<div class="field" style="margin-top:22px"><span id="typeName"></span><span class="caret"></span></div>'+
      '<div class="btn pulse" style="margin-top:18px">Start learning</div>');
  }
  function promptScene(){
    return app("seekhai · new course",
      '<h2 class="big">What do you want to learn?</h2>'+
      '<div class="field"><span id="typePrompt"></span><span class="caret"></span></div>'+
      '<p class="lead" style="margin-top:14px">Your role? <b style="color:var(--ink)">ML engineer</b></p>'+
      '<div class="btn pulse">Build my course</div>');
  }
  function buildLog(){
    var lines = [
      ['scouting','k-web','web_search (Exa) "multi-agent orchestration patterns" → 6 results'],
      ['scouting','k-web','MCP extract [paper] arxiv.org/abs/2402… → 23 chunks'],
      ['scouting','k-audit','Scouting Auditor (Claude Sonnet) · score 0.86 ✓'],
      ['generation','k-gen','generating MCQ (definition) · DL2'],
      ['generation','k-gen','the agent chose DRAG-DROP for "communication primitives"'],
      ['checking','k-chk','Domain Checker (GLM) · on-domain ✓'],
      ['verification','k-chk','Verification (Gemini, independent) · pass'],
      ['generation','k-gen','code walkthrough (6 steps) · LangGraph'],
      ['persist','k-done','✅ build complete · 41 interactions']
    ];
    var rows = lines.map(function(l,i){
      return '<div class="ln" style="animation-delay:'+(i*1.35)+'s"><span class="ph2">'+l[0]+'</span><span class="'+l[1]+'">'+l[2]+'</span></div>';
    }).join("");
    return app("seekhai · building",'<div class="term" id="term">'+rows+'</div><div class="pbar"><span></span></div>');
  }
  function curriculum(){
    return app("seekhai · cost & curriculum",
      '<h2 class="big" style="font-size:24px">'+C.title.split(":")[0]+'</h2>'+
      '<div class="topic"><span class="dl dl2">DL2</span><div><b>Agent Architectures &amp; Communication Primitives</b><br><span class="lead">topologies · inter-agent protocols</span></div></div>'+
      '<div class="topic"><span class="dl dl3">DL3</span><div><b>Orchestration Strategies &amp; Coordination</b><br><span class="lead">routing · consensus · shared state</span></div></div>'+
      '<div class="topic"><span class="dl dl3">DL3</span><div><b>Reliability, Evaluation &amp; Production</b><br><span class="lead">failure modes · observability</span></div></div>'+
      '<div class="chips"><span class="chip-stat">Est. build <b>$0.58</b></span><span class="chip-stat">Finish in <b>~2 hrs</b></span><span class="chip-stat"><b>41</b> interactions</span></div>');
  }
  function illustration(){
    return app("seekhai · illustrations",
      '<div class="illus-frame" style="position:relative"><span class="zoom-tag">⤢ click to enlarge</span>'+
      '<div class="diagram">'+
        '<div class="node orch">Orchestrator<small>routes tasks · shares state</small></div>'+
        '<div class="node">Planner<small>decomposes goal</small></div>'+
        '<div class="node">Researcher<small>tool-calling agent</small></div>'+
        '<div class="node">Critic<small>verifies output</small></div>'+
      '</div><p class="lead" style="margin-top:12px">Figure · a supervisor topology for multi-agent orchestration</p></div>');
  }
  function learnRail(){
    function q(t,cls,tag,here){return '<div class="qitem'+(here?' here':'')+'"><span class="t '+cls+'">'+t+'</span> '+tag+'<span class="tag">DL'+(cls==='none'?'3':(cls==='ok'?'2':'2'))+'</span></div>';}
    var rail='<div class="rail"><div class="sub">Topologies</div>'+
      q('✓','ok','Q1 · MCQ')+q('✓','ok','Q2 · ORDER')+q('✗','bad','Q3 · MCQ')+
      '<div class="sub">Communication</div>'+
      q('▸','none','Q4 · DRAG-DROP',true)+q('○','none','Q5 · CODE')+q('○','none','Q6 · MCQ')+'</div>';
    var body='<div class="qbody"><div class="qh"><b>Communication primitives</b><span class="badge" style="color:var(--warn);border-color:#e6d4a0;background:#fbf4e3">Difficulty: Medium (DL2)</span></div>'+
      '<p class="lead">Map each inter-agent concept to the mechanism it belongs to.</p>'+
      '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'+
        '<span class="placed-chip" style="opacity:1">Shared Scratchpad</span><span class="placed-chip" style="opacity:1">Message Schema</span>'+
        '<span class="placed-chip" style="opacity:1">Structured Handoff</span><span class="placed-chip" style="opacity:1">Tool-call Delegation</span></div>'+
      '<p class="lead" style="margin-top:14px;font-size:13px">Adaptive: after 2 correct in a row, the next topic steps up to <b style="color:var(--bad)">DL3</b>.</p></div>';
    return app("seekhai · learn","<div class='learn'>"+rail+body+"</div>");
  }
  function dragdrop(){
    return app("seekhai · drag-drop",
      '<div style="position:relative">'+
      '<div class="qh" style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><b>LangGraph communication primitives</b><span class="badge">DRAG-DROP</span></div>'+
      '<p class="lead">Drag each concept into the right box.</p>'+
      '<div class="dd-boxes" id="ddBoxes" style="margin-top:12px">'+
        ddBox('Shared Scratchpad','Blackboard state')+
        ddBox('Message Schema','Typed message contract')+
        ddBox('Structured Handoff','Explicit agent→agent pass')+
        ddBox('Tool-call Delegation','Delegate via a tool call')+
      '</div>'+
      '<div id="flyer" class="ent" style="bottom:-60px; opacity:0">Blackboard state</div>'+
      '</div>');
  }
  function ddBox(lab,chip){ return '<div class="box" data-chip="'+chip+'"><span class="lab">'+lab+'</span><span class="placed-chip">'+chip+'</span></div>'; }
  function dashboard(){
    return app("seekhai · dashboard",
      '<h2 class="big" style="font-size:22px">Your progress</h2>'+
      '<div class="dash" style="margin-top:12px">'+
        '<div class="card"><h4>Accuracy by topic</h4>'+
          acc('Topologies',85)+acc('Communication',70)+acc('Coordination',45)+'</div>'+
        '<div class="card"><h4>Where to improve</h4>'+
          '<div class="weak"><span>Coordination &amp; consensus</span><b>3 misses</b></div>'+
          '<div class="weak"><span>Failure propagation</span><b>2 misses</b></div>'+
          '<p class="lead" style="margin-top:10px;font-size:12.5px">Adaptive tracking nudged these to <b style="color:var(--bad)">DL3</b> for review.</p>'+
          '<h4 style="margin-top:14px">Feedback</h4><div class="fb"><div class="thumb up">👍</div><div class="thumb">👎</div><span class="lead" style="align-self:center;font-size:12.5px">one-tap on any question</span></div>'+
        '</div>'+
      '</div>');
  }
  function acc(n,w){ return '<div class="accrow"><span style="width:110px">'+n+'</span><span class="meter"><span style="--w:'+w+'%"></span></span><b style="font-variant-numeric:tabular-nums">'+w+'%</b></div>'; }
  function pdfUpload(){
    return app("seekhai · new course",
      '<h2 class="big" style="font-size:24px">Start from your own material</h2>'+
      '<div class="drop"><div class="file">📄 orchestration-deck.pdf · 3.2 MB</div>'+
      '<div class="shimmer" id="shim"></div>'+
      '<div class="parse">extracting slides → building your course…</div></div>'+
      '<p class="lead" style="margin-top:12px">PDF, slide decks &amp; docs — the same agent pipeline, seeded from your file.</p>');
  }
  function outro(){
    return '<div class="outro"><div class="logo">seekhai<span class="dot">.</span></div><div class="tag">Learn anything — by doing.</div></div>';
  }
  function app(barlabel, inner){
    return '<div class="mock"><div class="app"><div class="bar"><i></i><i></i><i></i><span>'+barlabel+'</span></div><div class="body">'+inner+'</div></div></div>';
  }

  // ---- engine ------------------------------------------------------------
  var screen=document.getElementById("screen"), counter=document.getElementById("counter"),
      slabel=document.getElementById("slabel"), capEye=document.getElementById("capEye"),
      capTitle=document.getElementById("capTitle"), tl=document.getElementById("tl"),
      cover=document.getElementById("cover");
  var idx=-1, timer=null, rafId=null, startT=0, elapsedBefore=0, playing=false;
  var TOTAL=DUR.reduce(function(a,b){return a+b},0);

  function typeInto(el, text, cps){
    if(!el) return; if(reduce){el.textContent=text; return;}
    var i=0; (function tick(){ el.textContent=text.slice(0,i); if(i++<=text.length) setTimeout(tick, 1000/cps); })();
  }

  function show(i){
    idx=i; var s=scenes[i];
    // build scene
    var div=document.createElement("div"); div.className="scene"; div.innerHTML=s.html();
    screen.innerHTML=""; screen.appendChild(div);
    // force reflow then activate (retriggers CSS entrance anims)
    void div.offsetWidth; div.classList.add("active");
    counter.textContent=pad(i+1)+" / 10";
    slabel.textContent="// "+pad(i+1)+" · "+s.label;
    capEye.textContent=s.eye;
    capTitle.textContent=""; var span=document.createElement("span"); span.className="cap-in"; span.textContent=s.cap; capTitle.appendChild(span);
    // per-scene scripted motion
    if(i===0) typeInto(div.querySelector("#typeName"),"Mohit",9);
    if(i===1) typeInto(div.querySelector("#typePrompt"),C.prompt,26);
    if(i===2){ var t=div.querySelector("#term"); if(t){ void t.offsetWidth; t.classList.add("run"); } }
    if(i===6) runDragDrop(div);
  }
  function pad(n){return (n<10?"0":"")+n;}

  function runDragDrop(div){
    if(reduce){ div.querySelectorAll(".box").forEach(function(b){b.classList.add("filled")}); return; }
    var boxes=[].slice.call(div.querySelectorAll(".box"));
    var flyer=div.querySelector("#flyer");
    var order=[0,1,2,3];
    order.forEach(function(bi,k){
      setTimeout(function(){
        var b=boxes[bi]; if(!b||!flyer) return;
        flyer.textContent=b.getAttribute("data-chip");
        var br=b.getBoundingClientRect(), pr=flyer.parentElement.getBoundingClientRect();
        flyer.style.transition="none"; flyer.style.opacity="0"; flyer.style.transform="translate(0,60px)";
        void flyer.offsetWidth;
        flyer.style.transition="transform .55s cubic-bezier(.2,.8,.2,1), opacity .3s";
        flyer.style.opacity="1";
        flyer.style.transform="translate("+((br.left+br.width/2)-(pr.left+pr.width/2))+"px,"+((br.top+18)-(pr.top+pr.height))+"px)";
        setTimeout(function(){ b.classList.add("filled"); flyer.style.opacity="0"; }, 560);
      }, 1400 + k*2400);
    });
  }

  function advance(){
    if(idx+1<scenes.length){ show(idx+1); scheduleNext(); }
    else { // loop back to start after a beat
      show(0); scheduleNext();
    }
  }
  function scheduleNext(){ clearTimeout(timer); timer=setTimeout(advance, DUR[idx]*1000); }

  function loopTimeline(){
    var now=performance.now(); var e=(elapsedBefore+(now-startT))/1000;
    var frac=(e % TOTAL)/TOTAL; tl.style.width=(frac*100)+"%";
    rafId=requestAnimationFrame(loopTimeline);
  }

  // ---- audio (soft generative pad + gentle arpeggio) ---------------------
  var actx=null, master=null, muted=false, arpTimer=null;
  function startAudio(){
    try{
      actx=new (window.AudioContext||window.webkitAudioContext)();
      master=actx.createGain(); master.gain.value=0.0; master.connect(actx.destination);
      master.gain.linearRampToValueAtTime(0.16, actx.currentTime+3);
      // two detuned saw/triangle pads
      [110,164.81].forEach(function(f,i){
        var o=actx.createOscillator(); o.type=i?"triangle":"sine"; o.frequency.value=f;
        var g=actx.createGain(); g.gain.value=i?0.05:0.09;
        var lfo=actx.createOscillator(); lfo.frequency.value=0.06+i*0.03;
        var lg=actx.createGain(); lg.gain.value=0.03; lfo.connect(lg); lg.connect(g.gain);
        o.connect(g); g.connect(master); o.start(); lfo.start();
      });
      // gentle bell arpeggio in a warm minor pentatonic
      var notes=[329.63,392.0,440.0,587.33,659.25];
      var step=0;
      arpTimer=setInterval(function(){
        if(!actx) return;
        var o=actx.createOscillator(), g=actx.createGain();
        o.type="sine"; o.frequency.value=notes[step%notes.length]* (step%9===8?0.5:1);
        g.gain.value=0; o.connect(g); g.connect(master);
        var t=actx.currentTime; g.gain.linearRampToValueAtTime(0.06,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+1.6);
        o.start(t); o.stop(t+1.7); step++;
      }, 1900);
    }catch(e){/* audio optional */}
  }
  document.getElementById("muteBtn").onclick=function(){
    muted=!muted; if(master) master.gain.setTargetAtTime(muted?0:0.16, actx.currentTime, .2);
    this.textContent=muted?"♪̸":"♪"; this.style.color=muted?"var(--muted-dim)":"#cfe6da";
  };

  function play(){
    if(playing) return; playing=true;
    cover.classList.add("hide");
    startAudio();
    startT=performance.now(); elapsedBefore=0;
    show(0); scheduleNext(); loopTimeline();
  }
  function restart(){
    clearTimeout(timer); cancelAnimationFrame(rafId);
    elapsedBefore=0; startT=performance.now(); show(0); scheduleNext(); loopTimeline();
  }
  cover.onclick=play;
  document.getElementById("restartBtn").onclick=function(){ if(!playing){play();} else {restart();} };
})();
</script>
