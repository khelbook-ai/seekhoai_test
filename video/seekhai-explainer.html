<title>Seekhai — product tour</title>

<style>
  :root{
    --stage:#0d1411; --stage2:#131d19; --edge:#20302a;
    --paper:#fbfbfa; --paper2:#f1f0ec; --line:#dcdbd6;
    --ink:#14201b; --ink-soft:#4a5a52;
    --accent:#37b98a; --accent-2:#5fd3a8; --accent-deep:#2f5d50;
    --muted:#8ea79c; --muted-dim:#5f7369;
    --ok:#1f7a4d; --bad:#b23a2d; --warn:#b8862a;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 700px at 50% -10%, #16241d 0%, transparent 60%), var(--stage);
    color:#dfeee7; font-family:var(--sans); display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; overflow:hidden}
  .stage{position:relative; width:min(96vw,1120px); aspect-ratio:16/9; background:var(--stage2);
    border:1px solid var(--edge); border-radius:16px; box-shadow:0 40px 120px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.03); overflow:hidden}

  .topband{position:absolute; top:0; left:0; right:0; z-index:7; padding:14px 26px 20px;
    background:linear-gradient(180deg, rgba(8,14,11,.97) 52%, rgba(8,14,11,.6) 82%, transparent)}
  .tb-row{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px}
  .wordmark{font-weight:800; letter-spacing:.02em; font-size:15px}
  .wordmark .dot{color:var(--accent)}
  .counter{font-family:var(--mono); font-size:12px; color:var(--muted-dim); font-variant-numeric:tabular-nums}
  .cap-eyebrow{font-family:var(--mono); font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent)}
  .cap-title{font-size:21px; font-weight:800; letter-spacing:-.01em; margin-top:3px; color:#eafff6; text-wrap:balance; max-width:90%; line-height:1.25; min-height:1.25em}
  .cap-cursor{display:inline-block; width:2px; height:1em; background:var(--accent-2); margin-left:2px; vertical-align:-2px; animation:blink 1s steps(1) infinite}
  .scene-label{position:absolute; bottom:13px; left:22px; z-index:7; font-family:var(--mono); font-size:11.5px; color:var(--muted-dim)}

  .screen{position:absolute; inset:0}
  .scene{position:absolute; inset:0; display:grid; place-items:center; opacity:0; transform:scale(1.012);
    transition:opacity .6s ease, transform .6s ease; padding:118px 52px 54px}
  .scene.active{opacity:1; transform:none}
  /* scene content stays hidden until the caption finishes streaming, then reveals */
  .mock{width:100%; max-width:820px; opacity:0; transform:translateY(12px); transition:opacity .55s ease, transform .55s ease}
  .outro{opacity:0; transition:opacity .55s ease}
  .scene.revealed .mock, .scene.revealed .outro{opacity:1; transform:none}

  .app{background:var(--paper); color:var(--ink); border-radius:12px; border:1px solid var(--line); box-shadow:0 20px 50px rgba(0,0,0,.35); overflow:hidden}
  .app .bar{display:flex; align-items:center; gap:8px; padding:9px 14px; background:var(--paper2); border-bottom:1px solid var(--line)}
  .app .bar i{width:10px; height:10px; border-radius:50%; background:#cfceca; display:block}
  .app .bar span{font-family:var(--mono); font-size:11px; color:var(--ink-soft); margin-left:8px}
  .app .body{padding:20px 22px}

  h2.big{font-size:24px; font-weight:800; letter-spacing:-.01em; margin:0 0 6px; text-wrap:balance}
  .lead{color:var(--ink-soft); font-size:14px; margin:0}
  .field{margin-top:14px; border:2px solid var(--line); border-radius:10px; padding:13px 15px; font-size:16px; background:#fff; color:var(--ink); display:flex; align-items:center}
  .field.mini{font-size:14px; padding:10px 13px}
  .caret{display:inline-block; width:2px; height:1.1em; background:var(--accent-deep); margin-left:1px; vertical-align:-2px; animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .btn{margin-top:16px; display:inline-block; background:var(--accent-deep); color:#fff; font-weight:700; font-size:14px; padding:12px 18px; border-radius:10px}
  .btn.pulse{animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(47,93,80,.45)}50%{box-shadow:0 0 0 10px rgba(47,93,80,0)}}
  .flabel{font-size:12px; color:var(--ink-soft); margin-top:14px; font-weight:600}

  .term{font-family:var(--mono); font-size:12px; line-height:1.85; background:#0b1a14; color:#cfe6da; border:1px solid #1c3329; border-radius:12px; padding:15px 17px; height:280px; overflow:hidden}
  .term .ln{opacity:0; transform:translateY(6px)}
  .term.run .ln{animation:logIn .4s ease forwards}
  @keyframes logIn{to{opacity:1; transform:none}}
  .ph2{color:#5c8a78; display:inline-block; min-width:96px}
  .k-web{color:#7fd1c4}.k-audit{color:#d3a4ff}.k-gen{color:#ffd580}.k-chk{color:#a8e06a}.k-done{color:#7CFFB2;font-weight:700}
  .pbar{height:8px; background:#0b1a14; border:1px solid #1c3329; border-radius:99px; margin-top:12px; overflow:hidden}
  .pbar>span{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent-deep),var(--accent))}
  .term.run + .pbar>span{animation:fill 12s linear forwards}
  @keyframes fill{to{width:100%}}

  .tcard{border:1px solid var(--line); border-radius:10px; margin-top:10px; background:#fff; overflow:hidden}
  .tcard .th{display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--paper2); border-bottom:1px solid var(--line)}
  .tcard .th b{font-size:14px}
  .tcard .subs{display:grid; grid-template-columns:1fr 1fr; gap:2px 18px; padding:9px 16px}
  .subrow{font-size:12.5px; color:var(--ink); padding:3px 0; display:flex; gap:8px; align-items:baseline}
  .subrow .d{width:5px;height:5px;border-radius:50%;background:var(--accent-deep);flex:0 0 5px;transform:translateY(-2px)}
  .dl{font-family:var(--mono); font-size:12px; font-weight:700; padding:3px 9px; border-radius:99px}
  .dl2{color:var(--warn); background:#fbf4e3; border:1px solid #e6d4a0}
  .dl3{color:var(--bad); background:#fbeeeb; border:1px solid #e6bdb4}
  .chips{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}
  .chip-stat{font-family:var(--mono); font-size:12px; background:var(--paper2); border:1px solid var(--line); padding:7px 11px; border-radius:8px; color:var(--ink-soft)}
  .chip-stat b{color:var(--ink)}

  .order-list{display:flex; flex-direction:column; gap:9px; margin-top:6px; position:relative}
  .oitem{display:flex; align-items:center; gap:12px; padding:12px 14px; border:2px solid var(--line); border-radius:10px; background:#fff; font-size:13.5px; transition:border-color .3s, background .3s, box-shadow .2s, transform .2s}
  .oitem .n{width:24px;height:24px;line-height:22px;text-align:center;border-radius:50%;background:var(--paper2);font-weight:700;font-family:var(--mono);font-size:12px;flex:0 0 24px}
  .oitem.grabbed{border-color:var(--accent-deep); box-shadow:0 12px 26px rgba(0,0,0,.16); transform:scale(1.02)}
  .oitem.ok{border-color:var(--ok); background:#f1f8f4}

  .learn{display:grid; grid-template-columns:230px 1fr; gap:16px}
  .rail{background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px}
  .rail-score{font-size:12.5px; color:var(--ink-soft); padding:2px 6px 9px; border-bottom:1px solid var(--line); margin-bottom:4px}
  .rail-score b{color:var(--ink); font-size:1.05rem}
  .rail .sub{font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft); margin:8px 4px 3px}
  .qitem{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:7px; font-size:12px; color:var(--ink); transition:background .3s}
  .qitem .t{width:15px; text-align:center; font-weight:800}
  .qitem.here{background:#e3ede9; font-weight:700}
  .t.ok{color:var(--ok)} .t.bad{color:var(--bad)} .t.none{color:#b9c0ba}
  .qitem .tag{margin-left:auto; font-family:var(--mono); font-size:10px; color:var(--ink-soft)}
  .qbody{background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px}
  .metrics{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:12px}
  .mtile{background:var(--paper2); border:1px solid var(--line); border-radius:8px; padding:8px 10px}
  .mtile .mv{font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1}
  .mtile .mk{font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-top:3px}
  .learn-head{display:flex; justify-content:space-between; align-items:baseline; gap:10px; font-size:12px; color:var(--ink-soft)}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .prog{height:7px; background:var(--paper2); border-radius:99px; overflow:hidden; margin-top:7px}
  .prog>span{display:block; height:100%; background:var(--accent-deep); transition:width .7s ease}
  .qh{display:flex; gap:8px; align-items:center; margin-top:12px}
  .badge{font-size:11px; padding:2px 9px; border-radius:99px; border:1px solid var(--line); color:var(--ink-soft)}
  .actions{display:flex; gap:10px; margin-top:14px}
  .action-btn{flex:1; text-align:center; padding:11px; font-weight:700; font-size:13px; border:2px solid var(--accent-deep); border-radius:9px; color:var(--accent-deep); background:#fff; transition:background .2s}
  .action-btn.hot{background:#eaf5ef}
  .panel{margin-top:12px; padding:12px 14px; background:#fff; border:1px solid var(--line); border-left:4px solid var(--accent-deep); border-radius:8px; font-size:12.5px; opacity:0; height:0; overflow:hidden}
  .panel.open{opacity:1; height:auto; animation:capB .35s ease}
  @keyframes capB{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .panel h5{margin:0 0 5px; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft)}

  .dd-boxes{display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:8px}
  .box{border:2px dashed var(--line); border-radius:12px; padding:11px; min-height:70px; display:flex; flex-direction:column; gap:5px; background:#fff; transition:border-color .3s, background .3s}
  .box .lab{font-weight:700; font-size:12.5px}
  .box.filled{border-style:solid; border-color:var(--ok); background:#f1f8f4}
  .placed-chip{display:inline-block; background:#eaf5ef; border:1px solid #bfe0cd; color:var(--accent-deep); font-weight:600; font-size:11.5px; padding:4px 8px; border-radius:8px; opacity:0}
  .box.filled .placed-chip{animation:pop .3s ease forwards}
  @keyframes pop{from{transform:scale(.8);opacity:0}to{transform:none;opacity:1}}
  .tray{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; min-height:40px}
  .chip{display:inline-block; padding:8px 12px; border:2px solid var(--accent-deep); border-radius:9px; background:#fff; font-size:12px; font-weight:600; color:var(--ink); transition:opacity .3s}
  .chip.used{opacity:.25}

  /* code walkthrough */
  .wt{display:grid; grid-template-columns:236px 1fr; gap:12px; margin-top:2px}
  .wt-steps{display:flex; flex-direction:column; gap:7px}
  .wt-step{border:1px solid var(--line); border-radius:8px; padding:9px 11px; font-size:12.5px; background:#fff; transition:background .3s, border-color .3s}
  .wt-step.on{border-color:var(--accent-deep); background:#f1f8f4}
  .wt-step b{font-size:12.5px}
  .wt-step small{display:block; font-weight:400; color:var(--ink-soft); margin-top:2px; font-size:11px}
  .wt-code{border:1px solid var(--line); border-radius:10px; overflow:hidden; background:#fff}
  .wt-tab{font-family:var(--mono); font-size:11.5px; padding:8px 12px; background:var(--paper2); border-bottom:1px solid var(--line); color:var(--ink)}
  .wt-view{position:relative; display:flex; padding:8px 0; max-height:300px; overflow:hidden}
  .wt-gutter{font-family:var(--mono); font-size:12px; line-height:20px; color:#b3b3ad; text-align:right; padding:0 8px 0 12px; user-select:none}
  .wt-gutter div{height:20px}
  .wt-pre{font-family:var(--mono); font-size:12px; line-height:20px; margin:0; padding:0 12px; white-space:pre; flex:1; min-width:0; overflow-x:auto}
  .wt-tok-k{color:#7a3ea8}.wt-tok-s{color:#2f7d4f}.wt-tok-c{color:#9aa39d}
  .wt-band{position:absolute; left:0; right:0; background:rgba(47,93,80,.13); border-left:3px solid var(--accent-deep); transition:top .4s ease, height .4s ease; pointer-events:none; z-index:0}

  /* routing */
  .route{display:grid; gap:8px; margin-top:4px; place-items:center}
  .rnode{border:2px solid var(--accent-deep); background:#f2f8f5; border-radius:12px; padding:12px 18px; font-weight:700; font-size:14px; text-align:center}
  .rnode small{display:block; font-weight:500; color:var(--ink-soft); font-size:11px; margin-top:2px}
  .rsplit{display:grid; grid-template-columns:1fr 1fr; gap:20px; width:100%; margin-top:4px}
  .rbranch{text-align:center; opacity:0}
  .rbranch.show{animation:capB .6s ease forwards}
  .rarrow{font-family:var(--mono); font-size:12px; padding:6px 0}
  .rarrow.bad{color:var(--bad)} .rarrow.ok{color:var(--ok)}
  .rdest{border:2px solid var(--line); border-radius:10px; padding:11px; font-size:12.5px; background:#fff}
  .rdest.bad{border-color:#e6bdb4; background:#fbeeeb} .rdest.ok{border-color:#bfe0cd; background:#f1f8f4}
  .rdest b{display:block; margin-bottom:2px}

  .dash{display:grid; grid-template-columns:1.1fr 1fr; gap:12px}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px; padding:13px 15px}
  .card h4{margin:0 0 9px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft)}
  .statrow{display:flex; gap:8px; margin-bottom:12px}
  .stat{flex:1; background:#fff; border:1px solid var(--line); border-radius:9px; padding:9px 11px}
  .stat .v{font-size:19px; font-weight:800; font-variant-numeric:tabular-nums}
  .stat .k{font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-top:2px}
  .accrow{display:flex; align-items:center; gap:9px; margin:7px 0; font-size:12px}
  .meter{flex:1; height:8px; background:var(--paper2); border-radius:99px; overflow:hidden}
  .meter>span{display:block; height:100%; width:0; background:var(--accent-deep)}
  .scene.active .meter>span{animation:grow 1.1s ease forwards}
  @keyframes grow{to{width:var(--w)}}
  .weak{display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:1px dashed var(--line)}
  .weak b{color:var(--bad)} .weak.good b{color:var(--ok)}
  .fb{display:flex; gap:8px; margin-top:9px; align-items:center}
  .thumb{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);display:grid;place-items:center;font-size:15px;background:#fff}
  .thumb.up{border-color:#bfe0cd;background:#f1f8f4}
  .spark{width:100%;height:52px;display:block}

  .drop{border:2px dashed var(--accent-deep); border-radius:14px; padding:26px; text-align:center; background:#f2f8f5; position:relative; overflow:hidden}
  .drop .file{display:inline-flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:14px; font-weight:600; transform:translateY(-40px); opacity:0}
  .drop.reveal .file{animation:drop .7s cubic-bezier(.2,.8,.2,1) forwards}
  @keyframes drop{to{transform:none; opacity:1}}
  .shimmer{margin-top:13px; height:8px; border-radius:99px; background:linear-gradient(90deg,#cfe4d9,#eef6f1,#cfe4d9); background-size:200% 100%; animation:shim 1.4s linear infinite}
  @keyframes shim{to{background-position:-200% 0}}
  .parse{margin-top:11px; font-family:var(--mono); font-size:12px; color:var(--accent-deep)}

  .outro{text-align:center}
  .outro .logo{font-size:58px; font-weight:800; letter-spacing:-.02em}
  .outro .logo .dot{color:var(--accent)}
  .outro .tag{color:var(--muted); margin-top:8px; font-size:16px}

  .cursor{position:absolute; left:0; top:0; z-index:13; pointer-events:none; opacity:0; transform:translate(80px,340px); transition:transform .5s cubic-bezier(.3,.6,.2,1); filter:drop-shadow(0 2px 3px rgba(0,0,0,.5))}
  .cursor.show{opacity:1}
  .ripple{position:absolute; z-index:12; width:16px;height:16px;border-radius:50%; border:2px solid var(--accent); left:0; top:0; opacity:0; pointer-events:none; transform:translate(-50%,-50%)}
  .ripple.go{animation:ripple .5s ease-out}
  @keyframes ripple{0%{opacity:.9; transform:translate(-50%,-50%) scale(.4)}100%{opacity:0; transform:translate(-50%,-50%) scale(2.6)}}

  .timeline{position:absolute; left:0; right:0; bottom:0; height:3px; background:rgba(255,255,255,.08); z-index:8}
  .timeline>span{display:block; height:100%; width:0; background:var(--accent)}
  .controls{position:absolute; bottom:12px; right:16px; z-index:9; display:flex; gap:8px}
  .ctl{width:32px;height:32px;border-radius:9px;border:1px solid var(--edge);background:rgba(255,255,255,.06); color:#cfe6da; cursor:pointer; font-size:13px; display:grid; place-items:center}
  .ctl:hover{background:rgba(255,255,255,.12)}
  .cover{position:absolute; inset:0; z-index:20; background:radial-gradient(700px 400px at 50% 40%, #16241d, #0b120f); display:grid; place-items:center; cursor:pointer}
  .cover .play{width:84px;height:84px;border-radius:50%; background:var(--accent); color:#06120d; display:grid; place-items:center; font-size:30px; box-shadow:0 20px 60px rgba(55,185,138,.4); transition:transform .2s}
  .cover:hover .play{transform:scale(1.06)}
  .cover .t1{position:absolute; bottom:152px; font-weight:800; font-size:36px; letter-spacing:-.01em}
  .cover .t2{position:absolute; bottom:66px; color:#d6ebe2; font-size:19px; font-weight:500; max-width:680px; text-align:center; line-height:1.45; padding:0 24px; text-wrap:balance}
  .hide{opacity:0!important; pointer-events:none}

  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001s!important; transition-duration:.2s!important} }
  @media (max-width:640px){ .cap-title{font-size:16px; max-width:100%} .learn,.wt{grid-template-columns:1fr} .metrics{grid-template-columns:repeat(2,1fr)} }
</style>

<div class="stage" id="stage">
  <div class="topband">
    <div class="tb-row"><div class="wordmark">seekhai<span class="dot">.</span></div><div class="counter" id="counter">01 / 11</div></div>
    <div class="cap-eyebrow" id="capEye">Ask in plain language</div>
    <div class="cap-title" id="capTitle"></div>
  </div>
  <div class="scene-label" id="slabel">// 01</div>
  <div class="screen" id="screen"></div>

  <svg class="cursor" id="cursor" width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M4 2 L4 20 L9 15 L12.5 22 L15 21 L11.5 14 L18 14 Z" fill="#fff" stroke="#0d1411" stroke-width="1.4" stroke-linejoin="round"/>
  </svg>
  <div class="ripple" id="ripple"></div>

  <div class="timeline"><span id="tl"></span></div>
  <div class="controls">
    <button class="ctl" id="muteBtn" title="Mute">♪</button>
    <button class="ctl" id="restartBtn" title="Restart">⟲</button>
  </div>
  <div class="cover" id="cover">
    <div class="play">▶</div>
    <div class="t1">Seekhai</div>
    <div class="t2">A highly interactive, personalized, prompt-based educational course builder.</div>
  </div>
</div>

<script>
(function(){
  "use strict";
  var reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  var C = { prompt:"I want a mini but intermediate course on multi agent orchestration",
            title:"Multi-Agent Orchestration: Architectures, Coordination & Production Systems" };

  var scenes = [
    { label:"one prompt", eye:"Ask in plain language", cap:"One prompt, and your role in your own words — anyone from an undergrad to an AI engineer.", html:promptScene },
    { label:"build log", eye:"Watch it build, live", cap:"It researches the web and builds the whole course for you — sources, questions and checks — streamed live.", html:buildLog },
    { label:"curriculum", eye:"A real, detailed curriculum", cap:"Every topic and subtopic, graded DL1–DL3 for adaptive difficulty and sourced live from the web.", html:curriculum },
    { label:"order the steps", eye:"Learn by doing — ordering", cap:"Interactions, not lectures — here, drag the orchestration steps into the right sequence.", html:orderScene },
    { label:"the learn screen", eye:"Every question + live metrics", cap:"All your questions on the left, live metrics on the right — jump around in any order.", html:learnScene },
    { label:"drag-drop", eye:"Drag-drop, with Content & Hints", cap:"Drag concepts into place — and every question has an on-demand Content panel and escalating Hints.", html:dragdrop },
    { label:"code walkthrough", eye:"Guided code walkthroughs", cap:"Step through real code — each concept highlights exactly the lines it explains.", html:walkScene },
    { label:"adaptive routing", eye:"Adaptive, dynamic routing", cap:"Every answer routes what comes next — a miss triggers a targeted follow-up, a streak unlocks DL3.", html:routing },
    { label:"dashboard", eye:"Know where you stand", cap:"Score over time, accuracy by topic, weaknesses nudged up for review, and one-tap feedback.", html:dashboard },
    { label:"from your files", eye:"Or start from your own material", cap:"Upload your own lecture slides or notes — Seekhai builds the whole course from them.", html:pdfUpload },
    { label:"seekhai", eye:"Learn anything, by doing", cap:"Seekhai — an agent-built, adaptive way to learn.", html:outro }
  ];
  var DUR = [14,14,14,21,20,18,17,13,15,10,5]; // ~161s — unhurried; content appears after the caption streams

  // ---- renderers ---------------------------------------------------------

    if(reduce){ line.setAttribute("points", coords.join(" ")); return; }
    var i=0; (function grow(){ line.setAttribute("points", coords.slice(0,i+1).join(" "));
      if(fill) fill.setAttribute("points","0,"+h+" "+coords.slice(0,i+1).join(" ")+" "+((i/(pts.length-1))*w).toFixed(1)+","+h);
      if(i++<coords.length-1) setTimeout(grow,120); })();
  }

  function advance(){ show(idx+1<scenes.length?idx+1:0); scheduleNext(); }
  function scheduleNext(){ clearTimeout(timer); timer=setTimeout(advance, DUR[idx]*1000); }
  function loopTimeline(){ var e=(performance.now()-startT)/1000; tl.style.width=(((e%TOTAL)/TOTAL)*100)+"%"; rafId=requestAnimationFrame(loopTimeline); }

  var actx=null, master=null, muted=false;
  function startAudio(){ try{
    actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
    master.gain.linearRampToValueAtTime(0.15, actx.currentTime+3);
    [110,164.81].forEach(function(f,i){ var o=actx.createOscillator(); o.type=i?"triangle":"sine"; o.frequency.value=f;
      var g=actx.createGain(); g.gain.value=i?0.05:0.09; var lfo=actx.createOscillator(); lfo.frequency.value=0.06+i*0.03;
      var lg=actx.createGain(); lg.gain.value=0.03; lfo.connect(lg); lg.connect(g.gain); o.connect(g); g.connect(master); o.start(); lfo.start(); });
    var notes=[329.63,392,440,587.33,659.25], step=0;
    setInterval(function(){ if(!actx||muted) return; var o=actx.createOscillator(), g=actx.createGain();
      o.type="sine"; o.frequency.value=notes[step%notes.length]*(step%9===8?0.5:1); g.gain.value=0; o.connect(g); g.connect(master);
      var t=actx.currentTime; g.gain.linearRampToValueAtTime(0.055,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+1.6); o.start(t); o.stop(t+1.7); step++; },2100);
  }catch(e){} }
  document.getElementById("muteBtn").onclick=function(){ muted=!muted; if(master) master.gain.setTargetAtTime(muted?0:0.15, actx.currentTime,.2); this.textContent=muted?"♪̸":"♪"; };

  function play(){ if(playing) return; playing=true; cover.classList.add("hide"); startAudio(); startT=performance.now(); show(0); scheduleNext(); loopTimeline(); }
  function restart(){ clearTimeout(timer); cancelAnimationFrame(rafId); startT=performance.now(); show(0); scheduleNext(); loopTimeline(); }
  cover.onclick=play;
  document.getElementById("restartBtn").onclick=function(){ playing?restart():play(); };
})();
</script>
