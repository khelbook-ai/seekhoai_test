# Seekhai_test — runtime settings (local-first). No cloud dependency.
database:
  # Overridable via DATABASE_URL env var.
  dsn: "postgresql://seekhai:seekhai@localhost:5432/seekhai"

storage:
  data_dir: "./data"
  feedback_dir: "./data/feedback"   # the required .md feedback tree lives here
  blob_backend: "postgres"          # postgres | local_fs  (S3 deferred, see spec 02)

scoring:                            # spec 04 §3 / §8
  base_multiplier: 2
  hint_penalty: 1
  score_floor: 0
  qa_partial_credit:
    full: 1.0
    partial: 0.5
    incorrect: 0.0

adaptivity:                         # spec 04 §5
  promote_streak: 2
  demote_errors: 2

followup:                           # spec 04 §4 — Q&A root-cause escalation
  max_probe_rounds: 3               # runtime root-cause Q&A after the seed follow-up
  reserve_extra_sources: 2          # extra sources scouted at build time for the reserve

clarification:                      # spec 01 §3
  max_questions: 10
  clarify_threshold: 0.7
  ambiguity_floor: 0.2

build:                              # spec 02 §5 — course build orchestration
  # Independent units are built in parallel; the sequential agent chains
  # (scout→audit→generate→check→verify) are ALWAYS preserved, so parallelism never changes
  # what any agent sees. `max_concurrent_llm_calls` is a single global throttle so nested
  # fan-out can't trigger provider rate-limit backoff.
  max_concurrent_subtopics: 4       # independent subtopics built in parallel
  max_concurrent_interactions: 4    # independent interactions within a subtopic
  max_concurrent_llm_calls: 8       # GLOBAL cap on in-flight model/tool calls (throttle only)

checkers:                           # spec 04 §8
  max_regen_retries: 2

scouting:                           # spec 05 §4 (open decisions D15, D21)
  max_scout_rounds: 3
  auditor_pass_threshold: 0.8

cost:
  buffer_pct: 15
  calibration_min_overlap: 0.34     # Jaccard similarity for "similar course" (spec 03 §6)
  calibration_min_samples: 1        # min similar past builds before calibrating

completion_time:                    # avg learner minutes per interaction type (spec 07, item 10)
  mcq: 1.0
  order: 1.5
  blanks: 1.5
  dragdrop: 2.0
  walkthrough: 4.0
  qa: 2.5
  followup_allowance: 0.4           # fraction of scored items expected to trigger a follow-up

observability:                      # spec 06 §3
  backend: "none"                   # none | langsmith | phoenix (none for Phase 0)
  project: "seekhai"
