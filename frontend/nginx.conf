server {
    listen 80;
    server_name _;

    # Allow feedback image uploads (spec 06 §2 caps at 10MB).
    client_max_body_size 12m;

    # API + blob images are proxied to the backend service (same-origin for the browser).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;    # long build/scout calls
    }

    # Static SPA: fall back to index.html for client-side routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
